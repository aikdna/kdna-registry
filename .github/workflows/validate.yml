name: Validate registry

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - name: Validate registry metadata
        run: npm run validate
      - name: Check file_count consistency
        run: npm run check:file-count || echo "::warning::Some domains may have incorrect file_count"
      - name: Check localization coverage
        run: npm run check:localization || echo "::warning::Some domains missing localization"
      - name: Security audit (token scan)
        run: |
          if grep -rq "eyJ\|ghp_\|gho_\|ghu_\|ghs_\|github_pat_\|-----BEGIN RSA PRIVATE KEY-----" domains.json; then
            echo "::error::Potential secret found in domains.json"
            exit 1
          fi
      - name: Quality badge consistency
        run: npm run check:quality

  remote-audit:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm ci
      - name: Validate remote URLs, digests, and v1.0 mimetype
        run: npm run validate:remote
